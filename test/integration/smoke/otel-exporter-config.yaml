---
# OTel declarative config consumed by ovs-exporter via OTEL_CONFIG_FILE.
# Drives metrics + traces + logs push to the in-stack otel-collector. The
# Prometheus reader is intentionally NOT declared here — ovs-exporter owns
# /metrics and refuses YAML that declares a pull reader. See
# internal/otel/config_file.go.
#
# Intervals are tuned aggressively (1s metric export, 500ms span/log
# batch) so the integration test loop converges in single-digit seconds
# instead of the production 15s.

file_format: "1.0-rc.1"

resource:
  attributes:
    - name: service.name
      value: ovs-exporter
    - name: deployment.environment
      value: integration-test

meter_provider:
  readers:
    - periodic:
        interval: 1000
        timeout: 5000
        exporter:
          otlp_grpc:
            endpoint: http://otel-collector:4317
            insecure: true

tracer_provider:
  processors:
    - batch:
        schedule_delay: 500
        export_timeout: 5000
        max_queue_size: 2048
        max_export_batch_size: 512
        exporter:
          otlp_grpc:
            endpoint: http://otel-collector:4317
            insecure: true
  sampler:
    always_on: {}

logger_provider:
  processors:
    - batch:
        schedule_delay: 500
        exporter:
          otlp_grpc:
            endpoint: http://otel-collector:4317
            insecure: true
