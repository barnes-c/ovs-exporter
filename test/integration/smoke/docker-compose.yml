services:
  ovs:
    build:
      context: ./ovs-dev
      dockerfile: Dockerfile
    image: ovs-dev:smoke
    container_name: ovs
    restart: unless-stopped
    cap_add:
      - NET_ADMIN
    volumes:
      - ovs-runtime:/var/run/openvswitch
      - ovs-logs:/var/log/openvswitch

  exporter:
    build:
      context: ../../..
      dockerfile: Dockerfile
      args:
        VERSION: smoke
        COMMIT: smoke
        BRANCH: smoke
        DATE: smoke
    image: ovs-exporter:smoke
    container_name: ovs-exporter
    restart: unless-stopped
    user: "0:0"
    depends_on:
      ovs:
        condition: service_healthy
    ports:
      - "10054:10054"
    volumes:
      - ovs-runtime:/var/run/openvswitch:ro
    command:
      - --web.listen-address=:10054
      - --cache.ttl=5s
      - --ovs.db-socket=unix:/var/run/openvswitch/db.sock
      - --ovs.run-dir=/var/run/openvswitch

volumes:
  ovs-runtime:
  ovs-logs:
