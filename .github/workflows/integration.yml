---
name: Integration tests
on:
  pull_request:
    paths:
      - "**.go"
      - "go.mod"
      - "go.sum"
      - "Dockerfile"
      - "Makefile"
      - "test/integration/**"
      - ".github/workflows/integration.yml"

concurrency:
  group: integration-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  integration:
    name: docker-compose smoke
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6
        with:
          persist-credentials: false
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6
        with:
          go-version-file: go.mod
      - name: Run integration tests
        run: make test-integration RUNTIME=docker
      - name: Capture container logs on failure
        if: failure()
        run: |
          compose_file=test/integration/smoke/docker-compose.yml
          docker compose -f "$compose_file" logs --no-color \
            > /tmp/compose.log 2>&1 || true
          tail -200 /tmp/compose.log
      - name: Tear down stack
        if: always()
        run: make smoke-down RUNTIME=docker
