---
name: yamllint
on:
  pull_request:
    paths:
      - "**.yml"
      - "**.yaml"
      - ".github/.yamllint"

permissions:
  contents: read

jobs:
  yamllint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false
      - run: pipx install yamllint
      - run: yamllint -c .github/.yamllint .
