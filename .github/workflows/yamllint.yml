---
name: yamllint
on:
  pull_request:
    paths:
      - "**.yml"
      - "**.yaml"
      - ".github/.yamllint"
  push:
    branches: [main, master]
    paths:
      - "**.yml"
      - "**.yaml"
      - ".github/.yamllint"

permissions:
  contents: read

jobs:
  yamllint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - run: pipx install yamllint
      - run: yamllint -c .github/.yamllint .
