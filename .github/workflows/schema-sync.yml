---
name: schema sync
on:
  schedule:
    # Weekly, Monday 07:00 UTC.
    # PRs only open when upstream actually changed.
    - cron: "0 7 * * MON"
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  vswitch:
    name: vswitch.ovsschema
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: 1.26.x

      - name: Fetch upstream schema
        run: |
          curl -fsSL \
            https://raw.githubusercontent.com/openvswitch/ovs/main/vswitchd/vswitch.ovsschema \
            -o schemas/vswitch.ovsschema

      - name: Regenerate ovsmodel
        run: |
          rm -f internal/ovsdb/ovsmodel/*.go
          go run github.com/ovn-org/libovsdb/cmd/modelgen \
            -p ovsmodel \
            -o internal/ovsdb/ovsmodel \
            schemas/vswitch.ovsschema

      - name: Verify build and tests still pass
        run: |
          make build
          make test

      - name: Open PR if upstream changed
        uses: peter-evans/create-pull-request@bb88e27d3f9cc69c8bc689eba126096c6fe3dded # v8.0.1
        with:
          title: "chore(schema): sync vswitch.ovsschema from upstream"
          commit-message: "chore(schema): sync vswitch.ovsschema from upstream"
          branch: chore/sync-vswitch-schema
          delete-branch: true
          labels: schema-sync
          body: |
            Automated sync of `schemas/vswitch.ovsschema` from
            `github.com/openvswitch/ovs@main` and regeneration of
            `internal/ovsdb/ovsmodel/`.

            Build + tests passed in this workflow. Review for any
            user-visible field additions, then merge.

            If this PR's CI fails on merge target, upstream introduced a
            breaking schema change — investigate before merging.
