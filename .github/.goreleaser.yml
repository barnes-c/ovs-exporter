---
version: 2
project_name: ovs-exporter

before:
  hooks:
    - go mod tidy
    - go mod download

builds:
  - id: ovs-exporter
    binary: ovs-exporter
    main: .
    mod_timestamp: "{{ .CommitTimestamp }}"
    env:
      - CGO_ENABLED=0
    goos:
      - linux
    goarch:
      - amd64
      - arm64
    flags:
      - -trimpath
    ldflags:
      - -s -w
      - -X github.com/prometheus/common/version.Version={{ .Version }}
      - -X github.com/prometheus/common/version.Revision={{ .Commit }}
      - -X github.com/prometheus/common/version.Branch={{ .Branch }}
      - -X github.com/prometheus/common/version.BuildDate={{ .Date }}
      - -X github.com/prometheus/common/version.BuildUser=goreleaser

archives:
  - id: tarball
    formats: [tar.gz]
    name_template: >-
      {{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}
    files:
      - LICENSE
      - README.md
      - CHANGELOG.md

nfpms:
  - id: packages
    package_name: ovs-exporter
    file_name_template: >-
      {{ .PackageName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}
    formats:
      - rpm
      - deb
    maintainer: Christopher Barnes <github@barnes.biz>
    description: OTel-native Prometheus exporter for Open vSwitch (OVS)
    license: Apache-2.0
    homepage: https://github.com/barnes-c/ovs-exporter
    bindir: /usr/bin
    contents:
      - src: examples/systemd/ovs-exporter.service
        dst: /usr/lib/systemd/system/ovs-exporter.service
      - src: examples/systemd/sysconfig.ovs-exporter
        dst: /etc/sysconfig/ovs-exporter
        type: config|noreplace
        packager: rpm
      - src: examples/systemd/sysconfig.ovs-exporter
        dst: /etc/default/ovs-exporter
        type: config|noreplace
        packager: deb
    rpm:
      group: System Environment/Daemons
    overrides:
      rpm:
        dependencies:
          - openvswitch
      deb:
        dependencies:
          - openvswitch-switch

dockers_v2:
  - id: ovs-exporter
    dockerfile: Dockerfile.release
    images:
      - "ghcr.io/barnes-c/ovs-exporter"
      - "docker.io/barnesbiz/ovs-exporter"
    tags:
      - "{{ .Version }}"
      - "latest"
    platforms:
      - linux/amd64
      - linux/arm64
    build_args:
      COMMIT: "{{ .FullCommit }}"
      DATE: "{{ .Date }}"
      VERSION: "{{ .Version }}"

source:
  enabled: true
  name_template: "{{ .ProjectName }}_{{ .Version }}_source"

sboms:
  - id: archive
    artifacts: archive
  - id: source
    artifacts: source

checksum:
  name_template: checksums.txt

snapshot:
  version_template: "{{ incpatch .Version }}-snapshot"

changelog:
  sort: asc
  abbrev: -1
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"

signs:
  - cmd: cosign
    signature: "${artifact}.bundle"
    args:
      - sign-blob
      - --bundle=${signature}
      - --yes
      - ${artifact}
    artifacts: checksum

docker_signs:
  - cmd: cosign
    artifacts: all
    output: true
    args:
      - sign
      - --yes
      - ${artifact}@${digest}

release:
  github:
    owner: barnes-c
    name: ovs-exporter
  draft: true
  prerelease: auto
  header: |
    ## ovs-exporter {{ .Tag }}

    ### Container images
    - `ghcr.io/barnes-c/ovs-exporter:{{ .Version }}`
    - `docker.io/barnesbiz/ovs-exporter:{{ .Version }}`

    ### Binaries
    Linux `amd64` / `arm64` tarballs are attached below (`ovs-exporter_{{ .Version }}_linux_*.tar.gz`).

    ### Packages
    `.deb` and `.rpm` packages for `amd64` / `arm64` are attached below.
    Install systemd unit at `/usr/lib/systemd/system/ovs-exporter.service`.

    ### Source & SBOMs
    Source tarball (`ovs-exporter_{{ .Version }}_source.tar.gz`) and SPDX SBOMs (`*.sbom.json`) are attached for supply-chain verification.
  footer: |
    ## Verification

    All artifacts are signed with [cosign](https://github.com/sigstore/cosign) keyless signing.

    Verify the checksums bundle:
    ```
    cosign verify-blob \
      --bundle checksums.txt.bundle \
      --certificate-identity-regexp "^https://github.com/barnes-c/ovs-exporter/" \
      --certificate-oidc-issuer https://token.actions.githubusercontent.com \
      checksums.txt
    ```

    Verify a container image:
    ```
    cosign verify ghcr.io/barnes-c/ovs-exporter:{{ .Version }} \
      --certificate-identity-regexp "^https://github.com/barnes-c/ovs-exporter/" \
      --certificate-oidc-issuer https://token.actions.githubusercontent.com
    ```
